name: cdn-integrity-guardrails

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate CDN artifacts
        run: |
          set -euo pipefail
          node scripts/validate-cdn-asset.js
