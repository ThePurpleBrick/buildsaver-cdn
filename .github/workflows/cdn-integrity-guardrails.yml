name: cdn-integrity-guardrails

on:
  push:
    branches:
      - main
    paths:
      - 'footer-code-injection.js'
      - 'deploy-manifest.json'
      - 'runtime-config.json'
      - 'scripts/validate-cdn-asset.js'
      - '.github/workflows/cdn-integrity-guardrails.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'footer-code-injection.js'
      - 'deploy-manifest.json'
      - 'runtime-config.json'
      - 'scripts/validate-cdn-asset.js'
      - '.github/workflows/cdn-integrity-guardrails.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate CDN artifacts
        run: |
          set -euo pipefail
          node scripts/validate-cdn-asset.js
